<div class="map-wrapper" #mapBoundary>

  <div id="map"></div>

  <app-map-menu-config
    (_isPanelVisible)="togglePanel($event)"
  ></app-map-menu-config>

  @if (isPanelVisible) {
    <app-map-tools [boundaryElement]="mapBoundary" [currentMode]="mode" (modeChange)="setMode($event)"
                   (clear)="clearAllLines()" (close)="isPanelVisible = false">
    </app-map-tools>
  }

</div>
