<div class="map-wrapper" #mapBoundary>

  <div id="map"></div>

  <app-map-menu-config
    (isPanelVisibleToggle)="togglePanel($event)"
    (isDrawingModeToggle)="toggleDrawingMode($event)"
  ></app-map-menu-config>

  @if (isPanelVisible) {
    <app-map-tools [boundaryElement]="mapBoundary" [currentMode]="mode" (modeChange)="setMode($event)"
                   (clear)="clearAllLines()" (close)="isPanelVisible = false">
    </app-map-tools>
  }

  <button
    class="confirm-button"
    (click)="onConfirmArea()"
  >Zatwierdź obszar</button>

</div>
